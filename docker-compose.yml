services:
  api:
    build: .
    container_name: valere-rag-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - ollama-init
    volumes:
      - ./data:/app/data
      - ./app:/app/app
      - ./tests:/app/tests

  qdrant:
    image: qdrant/qdrant:v1.8.4
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz >/dev/null 2>&1 || curl -sf http://localhost:6333/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=30m   
      - OLLAMA_NUM_PARALLEL=1
    # healthcheck bez curl-a 
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    environment:
      - OLLAMA_HOST=http://ollama:11434     # klijent u initu neka cilja server u "ollama" servisu
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["sh","-lc"]
    command: |
      echo "Waiting for ollama server..."
      until ollama list >/dev/null 2>&1; do sleep 2; done
      echo "Pulling model: ${OLLAMA_MODEL:-llama3.2:3b}"
      ollama pull "${OLLAMA_MODEL:-llama3.2:3b}"
    volumes:
      - ollama:/root/.ollama
    restart: "no"

volumes:
  qdrant_storage:
    name: valere-qdrant
  ollama:
    name: valere-ollama
